name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      STORAGE_BACKEND: local
      STORAGE_BASE_PATH: /tmp/model_artifacts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install \
            "fastapi>=0.100.0" \
            "uvicorn>=0.24.0" \
            "sqlalchemy>=2.0.0" \
            "alembic>=1.12.0" \
            psycopg2-binary \
            python-multipart \
            python-dotenv \
            "python-jose[cryptography]" \
            "bcrypt==4.0.1" \
            "passlib[bcrypt]==1.7.4" \
            "email-validator>=2.1.0" \
            "pytest>=7.4.0" \
            "httpx>=0.25.0"

      - name: Show installed versions
        run: pip list | grep -E "passlib|bcrypt|fastapi|sqlalchemy|pytest|httpx"

      - name: Run tests
        run: pytest tests/test_api.py -v --tb=short
